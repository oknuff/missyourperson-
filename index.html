<style>
  :root {
    --bg:#0d0d0f;--surface:#16161a;--border:#2a2a32;--muted:#52525e;
    --text:#f0eff4;--sub:#9898a8;--accent:#7c6af7;--accent2:#f76ab4;
    --glow:rgba(124,106,247,0.18);--radius:14px;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Roboto',sans-serif;font-weight:400;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,0.03) 1px,transparent 1px);background-size:40px 40px;z-index:0;pointer-events:none}
  body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(124,106,247,0.10) 0%,transparent 70%);z-index:0;pointer-events:none}
  header{text-align:center;padding:64px 20px 48px;position:relative;z-index:1}
  .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,106,247,0.12);border:1px solid rgba(124,106,247,0.25);border-radius:100px;padding:5px 14px;font-size:0.7rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:24px}
  .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
  h1{font-family:'Roboto',sans-serif;font-size:clamp(2.6rem,8vw,4.5rem);font-weight:900;line-height:1.05;letter-spacing:-2px;margin-bottom:14px;text-transform:uppercase}
  h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subhead{font-size:0.95rem;font-weight:400;color:var(--sub);max-width:380px;margin:0 auto;line-height:1.6}
  main{max-width:740px;margin:0 auto;padding:0 20px 100px;position:relative;z-index:1}
  .tab-bar{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:4px;margin-bottom:32px;gap:4px}
  .tab{flex:1;padding:11px;border:none;border-radius:100px;background:transparent;font-family:'Roboto',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all 0.22s ease}
  .tab.active{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(124,106,247,0.3)}
  .panel{display:none}.panel.active{display:block;animation:up 0.3s ease}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;position:relative}
  .card-head{margin-bottom:28px}
  .card-head h2{font-family:'Roboto',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-0.5px;text-transform:uppercase;margin-bottom:6px}
  .card-head p{font-size:0.85rem;color:var(--sub);font-weight:400}
  .field{margin-bottom:20px}
  .field label{display:block;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--sub);margin-bottom:8px}
  .field input,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-family:'Roboto',sans-serif;font-size:0.92rem;font-weight:400;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;resize:none}
  .field input::placeholder,.field textarea::placeholder{color:var(--muted)}
  .field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
  .field textarea{min-height:130px;line-height:1.65}
  .char-row{display:flex;justify-content:flex-end;margin-top:5px;font-size:0.72rem;font-weight:700;color:var(--muted)}
  .moods{display:flex;flex-wrap:wrap;gap:8px}
  .mood{padding:7px 14px;border:1px solid var(--border);border-radius:100px;background:transparent;font-family:'Roboto',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:0.04em;color:var(--sub);cursor:pointer;transition:all 0.18s ease}
  .mood:hover{border-color:var(--accent);color:var(--accent)}
  .mood.on{background:rgba(124,106,247,0.15);border-color:var(--accent);color:var(--accent)}
  .btn{width:100%;padding:15px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#9b6af7);color:#fff;font-family:'Roboto',sans-serif;font-size:0.88rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.22s ease;box-shadow:0 4px 24px rgba(124,106,247,0.3);margin-top:8px}
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,106,247,0.45)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
  .search-row{display:flex;gap:10px;margin-bottom:28px;align-items:flex-end}
  .search-row .field{flex:1;margin:0}
  .search-row .btn{width:auto;padding:13px 22px;margin:0;white-space:nowrap}
  .msg-count{font-size:0.72rem;font-weight:700;color:var(--sub);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px}
  .msg-count span{color:var(--accent)}
  .msg-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:12px;animation:up 0.3s ease both;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.2s}
  .msg-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:3px 0 0 3px}
  .msg-card:hover{border-color:rgba(124,106,247,0.35);transform:translateX(3px)}
  .msg-mood{font-size:0.68rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .msg-body{font-family:'Roboto',sans-serif;font-size:0.97rem;font-weight:400;line-height:1.7;color:var(--text)}
  .msg-time{margin-top:10px;font-size:0.7rem;font-weight:700;color:var(--muted);letter-spacing:0.06em}
  .empty{text-align:center;padding:52px 20px;color:var(--muted)}
  .empty-icon{font-size:2.5rem;display:block;margin-bottom:12px}
  .empty p{font-family:'Roboto',sans-serif;font-weight:700;font-size:0.95rem;color:var(--sub);text-transform:uppercase;letter-spacing:0.06em}
  .loader{display:flex;align-items:center;justify-content:center;gap:8px;padding:48px;color:var(--sub);font-size:0.82rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
  .spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.65s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e28;border:1px solid var(--border);color:var(--text);padding:12px 28px;border-radius:100px;font-size:0.82rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.5);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;pointer-events:none}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.ok{border-color:rgba(124,106,247,0.4)}
  #toast.err{border-color:rgba(247,106,106,0.4);color:#f76a6a}
  @media(max-width:560px){.card{padding:24px 18px}.search-row{flex-direction:column}.search-row .btn{width:100%}h1{font-size:2.4rem;letter-spacing:-1px}}
</style>
</head>
<body>

<header>
  <div class="badge"><div class="dot"></div> 100% Anonymous</div>
  <h1>Send a secret <em>message</em></h1>
  <p class="subhead">Write something honest. No name, no trace — just the words.</p>
</header>

<main>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('send',this)">✉️ &nbsp;Send Message</button>
    <button class="tab" onclick="switchTab('inbox',this)">📬 &nbsp;Check Inbox</button>
  </div>

  <!-- SEND -->
  <div class="panel active" id="panel-send">
    <div class="card">
      <div class="card-head">
        <h2>Write your message</h2>
        <p>They'll never know it was you.</p>
      </div>
      <div class="field">
        <label>Send to</label>
        <input type="text" id="to-name" placeholder="Enter their name…" maxlength="60" />
      </div>
      <div class="field">
        <label>Your message</label>
        <textarea id="msg-body" placeholder="Say what's on your mind…" maxlength="500" oninput="countChars()"></textarea>
        <div class="char-row"><span id="char-count">0</span>&thinsp;/&thinsp;500</div>
      </div>
      <div class="field">
        <label>Vibe</label>
        <div class="moods">
          <button class="mood" onclick="pickMood(this)">🌸 Sweet</button>
          <button class="mood" onclick="pickMood(this)">🔥 Intense</button>
          <button class="mood" onclick="pickMood(this)">💛 Grateful</button>
          <button class="mood" onclick="pickMood(this)">😔 Longing</button>
          <button class="mood" onclick="pickMood(this)">✨ Hopeful</button>
          <button class="mood" onclick="pickMood(this)">😂 Funny</button>
          <button class="mood" onclick="pickMood(this)">🤍 Friendly</button>
        </div>
      </div>
      <button class="btn" id="send-btn" onclick="sendMsg()">Send Anonymously →</button>
    </div>
  </div>

  <!-- INBOX -->
  <div class="panel" id="panel-inbox">
    <div class="card">
      <div class="card-head">
        <h2>Check your inbox</h2>
        <p>Search your name to see messages sent to you.</p>
      </div>
      <div class="search-row">
        <div class="field">
          <label>Your name</label>
          <input type="text" id="search-input" placeholder="Enter your name…" maxlength="60"
            onkeydown="if(event.key==='Enter') searchMsgs()" />
        </div>
        <button class="btn" id="search-btn" onclick="searchMsgs()">Search</button>
      </div>
      <div id="results">
        <div class="empty">
          <span class="empty-icon">📭</span>
          <p>Enter your name above to find messages.</p>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const SB_URL = 'https://xasxljvgvogczlmwvfsj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhhc3hsanZndm9nY3psbXd2ZnNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzcxMTEsImV4cCI6MjA4OTQxMzExMX0.8pFR-i3LD2rSiGft-KufcAfEEFdNnnSA7D2FbUZRO78';

async function sbInsert(row) {
  const r = await fetch(SB_URL + '/rest/v1/messages', {
    method: 'POST',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(row)
  });
  if (!r.ok) {
    const err = await r.text();
    console.error('Supabase insert error:', r.status, err);
    throw new Error(err);
  }
}

async function sbSelect(name) {
  const url = SB_URL + '/rest/v1/messages?to_name=eq.' + encodeURIComponent(name.trim().toLowerCase()) + '&order=created_at.desc';
  const r = await fetch(url, {
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY
    }
  });
  if (!r.ok) {
    const err = await r.text();
    console.error('Supabase select error:', r.status, err);
    throw new Error(err);
  }
  return r.json();
}

let mood = '';

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

function pickMood(btn) {
  document.querySelectorAll('.mood').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  mood = btn.textContent.trim();
}

function countChars() {
  document.getElementById('char-count').textContent = document.getElementById('msg-body').value.length;
}

async function sendMsg() {
  var to   = document.getElementById('to-name').value.trim();
  var body = document.getElementById('msg-body').value.trim();
  if (!to)   { toast('Please enter a name', 'err'); return; }
  if (!body) { toast('Please write a message', 'err'); return; }
  var btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    await sbInsert({ to_name: to.toLowerCase(), message: body, mood: mood || '🤍 Friendly' });
    document.getElementById('to-name').value = '';
    document.getElementById('msg-body').value = '';
    countChars();
    document.querySelectorAll('.mood').forEach(function(b){ b.classList.remove('on'); });
    mood = '';
    toast('Message sent! 🎉', 'ok');
  } catch(e) {
    toast('Failed to send — try again', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Anonymously →';
  }
}

async function searchMsgs() {
  var name = document.getElementById('search-input').value.trim();
  if (!name) { toast('Enter your name first', 'err'); return; }
  var box  = document.getElementById('results');
  var sbtn = document.getElementById('search-btn');
  box.innerHTML = '<div class="loader"><div class="spin"></div> Searching…</div>';
  sbtn.disabled = true;
  try {
    var rows = await sbSelect(name);
    if (!rows.length) {
      box.innerHTML = '<div class="empty"><span class="empty-icon">🕊️</span><p>No messages for ' + esc(name) + ' yet.</p></div>';
      return;
    }
    box.innerHTML = '<div class="msg-count"><span>' + rows.length + '</span> message' + (rows.length > 1 ? 's' : '') + ' for ' + esc(name) + '</div>';
    rows.forEach(function(row, i) {
      var d = document.createElement('div');
      d.className = 'msg-card';
      d.style.animationDelay = (i * 0.07) + 's';
      var t = new Date(row.created_at).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
      d.innerHTML = '<div class="msg-mood">' + esc(row.mood || '🤍 Friendly') + '</div><div class="msg-body">' + esc(row.message) + '</div><div class="msg-time">' + t + '</div>';
      box.appendChild(d);
    });
  } catch(e) {
    box.innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span><p>Something went wrong. Please try again.</p></div>';
  } finally {
    sbtn.disabled = false;
  }
}

var toastTimer;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.className = ''; }, 2800);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
